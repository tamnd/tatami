title       = "tatami"
baseURL     = "https://tatami.tamnd.com/"
description = "tatami (畳) is a single-file columnar storage format for web-scale crawl and search. One .tatami file is a compact cold document store and a hot inverted search index behind one layout and one reader, with keyword queries that return in well under ten milliseconds."
contentDir  = "content"
outputDir   = "public"
theme       = "tago-doks"
syntaxHighlight = "true"


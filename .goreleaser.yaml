# GoReleaser turns one tag push into everything a user might install from: raw
# archives, Linux packages (deb, rpm, apk), a multi-arch container image, and
# entries for the package managers (Homebrew, Scoop). `git tag vX.Y.Z && git
# push --tags` fans out to all of them through .github/workflows/release.yml.
#
# Publish steps that push to a repository we do not own yet (the Homebrew tap,
# the Scoop bucket) self-disable when their token is absent. A release with no
# extra secrets still produces every downloadable artifact and the container
# image; each manager lights up the moment its repository and token exist.
version: 2

project_name: tatami

before:
  hooks:
    - go mod download

builds:
  - id: tatami
    binary: tatami
    main: ./cmd/tatami
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/tamnd/tatami/cli.Version={{ .Version }}
      - -X github.com/tamnd/tatami/cli.Commit={{ .ShortCommit }}
      - -X github.com/tamnd/tatami/cli.Date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    # 64-bit only. The routing.bin off-heap format aliases a mapped int64 column
    # back as a []int with no copy, so search/routing_file.go carries a compile
    # guard that fails on a 32-bit build rather than mis-aliasing at runtime. That
    # rules out linux_386 and linux_arm_7, which is fine: tatami is a data engine
    # for 64-bit servers.
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64
      - windows_amd64
      - windows_arm64
      - freebsd_amd64
      - freebsd_arm64

archives:
  - id: default
    ids:
      - tatami
    name_template: "tatami_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

nfpms:
  - id: linux-packages
    package_name: tatami
    ids:
      - tatami
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: tamnd
    homepage: https://github.com/tamnd/tatami
    maintainer: Duc-Tam Nguyen <tamnd87@gmail.com>
    description: A compact columnar single-file format for web-scale crawl and search.
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/tatami/LICENSE

dockers_v2:
  - images:
      - ghcr.io/tamnd/tatami
    tags:
      - "{{ .Version }}"
      - latest
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.description: "A compact columnar single-file format for web-scale crawl and search"
      org.opencontainers.image.url: "https://github.com/tamnd/tatami"
      org.opencontainers.image.source: "https://github.com/tamnd/tatami"
      org.opencontainers.image.version: "{{ .Version }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.licenses: "MIT"

homebrew_casks:
  - name: tatami
    ids:
      - default
    repository:
      owner: tamnd
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}'
    directory: Casks
    homepage: https://github.com/tamnd/tatami
    description: A compact columnar single-file format for web-scale crawl and search
    skip_upload: '{{ if index .Env "HOMEBREW_TAP_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

scoops:
  - ids:
      - default
    repository:
      owner: tamnd
      name: scoop-bucket
      token: '{{ .Env.SCOOP_BUCKET_GITHUB_TOKEN }}'
    directory: bucket
    homepage: https://github.com/tamnd/tatami
    description: A compact columnar single-file format for web-scale crawl and search
    license: MIT
    skip_upload: '{{ if index .Env "SCOOP_BUCKET_GITHUB_TOKEN" }}false{{ else }}true{{ end }}'
    commit_author:
      name: Duc-Tam Nguyen
      email: tamnd87@gmail.com

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: archive
    artifacts: archive

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

docker_signs:
  - cmd: cosign
    artifacts: manifests
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999

release:
  github:
    owner: tamnd
    name: tatami
  draft: false
  prerelease: auto
